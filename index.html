            <div>

            <form class="logout-form" method="post" action="/logout">
              <button type="submit" class="logout-btn" aria-label="Вийти">
                <span class="logout-btn__icon" aria-hidden="true">

                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                  </svg>
                </span>
              </button>
            </form>

        </header>

        <div class="layout-main__workspace" id="layout-main-workspace">
          <main class="content" id="content-area" aria-live="polite">
            <h2 class="section-title">Користувачі</h2>
            <div class="section-root" id="table-wrap"></div>
            <footer class="app-footer" role="contentinfo">
              <div class="app-footer__inner">
                <section class="app-footer__block app-footer__block--copy">
                  <p>© 2026 NYMO Panel. Навчальний проект</p>
                </section>
                <section class="app-footer__block">
                  <p>Голобин В. А., КН-31</p>
                  <p>Коновалов А. С., КН-31</p>
                </section>
              </div>
            </footer>
          </main>

          <div class="detail-dock" id="detail-dock" aria-hidden="true">
            <div class="detail-dock__inner" id="detail-dock-inner">
              <aside
                class="detail-panel"
                id="user-profile-drawer"
                aria-hidden="true"
                role="dialog"
                aria-modal="true"
                aria-labelledby="user-profile-title"
              >
                <header class="drawer__header">
                  <h2 class="drawer__title" id="user-profile-title">Профіль користувача</h2>
                  <button class="drawer__close" id="user-profile-close" type="button" aria-label="Закрити">✕</button>
                </header>
                <div class="drawer__body" id="user-profile-body"></div>
              </aside>
              <aside
                class="detail-panel"
                id="report-detail-drawer"
                aria-hidden="true"
                role="dialog"
                aria-modal="true"
                aria-labelledby="report-detail-title"
              >
                <header class="drawer__header">
                  <h2 class="drawer__title" id="report-detail-title">Скарга</h2>
                  <button class="drawer__close" id="report-detail-close" type="button" aria-label="Закрити">✕</button>
                </header>
                <div class="drawer__body" id="report-detail-body"></div>
              </aside>
            </div>
          </div>
        </div>
      </div>
